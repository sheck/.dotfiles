[revset-aliases]
"immutable_heads()" = "present(trunk()) | tags()"

[revsets]
log = "(@ | ancestors(immutable_heads().., 2) | trunk()) ~ bookmarks(exact:\"staging\") ~ remote_bookmarks(exact:\"staging\", exact:\"origin\")"

[ui]
default-command = "log"
diff-formatter = ["difft", "--color=always", "$left", "$right"]
